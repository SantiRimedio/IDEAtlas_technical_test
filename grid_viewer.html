<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

  #header {
    background: #16213e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  #header h1 { font-size: 15px; font-weight: 600; color: #e94560; letter-spacing: 0.5px; }

  .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
  .leg-swatch { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); }

  #stats {
    display: flex; gap: 18px; margin-left: auto; font-size: 12px; color: #aaa;
  }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-val { font-size: 18px; font-weight: 700; color: #e94560; line-height: 1.1; }
  .stat-lbl { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

  #map { flex: 1; }

  #info-panel {
    position: absolute;
    bottom: 24px;
    right: 12px;
    z-index: 1000;
    background: rgba(22,33,62,0.95);
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 220px;
    font-size: 12px;
    backdrop-filter: blur(4px);
    display: none;
  }
  #info-panel h3 { font-size: 13px; color: #e94560; margin-bottom: 8px; }
  .info-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: #888; }
  .info-val { font-weight: 600; }
  .split-train { color: #4ea8de; }
  .split-val   { color: #f4a261; }
  .split-test  { color: #a8dadc; }
  .cls2-high   { color: #e63946; }
  .cls2-med    { color: #f4a261; }
  .cls2-low    { color: #aaa; }

  .leaflet-popup-content-wrapper {
    background: rgba(22,33,62,0.97);
    color: #eee;
    border: 1px solid #0f3460;
    border-radius: 6px;
  }
  .leaflet-popup-tip { background: #16213e; }
  .leaflet-popup-content { font-size: 12px; line-height: 1.6; }
</style>
</head>

// Colour logic
function tileColor(props) {
  const hasCls2 = props.class_2_pct > 0;
  const split = props.set;
  if (hasCls2) {
    // Red tones regardless of split — informal settlement present
    if (props.class_2_pct > 30) return { fill: 'rgba(230,57,70,0.75)', stroke: '#e63946' };
    if (props.class_2_pct > 5)  return { fill: 'rgba(230,57,70,0.55)', stroke: '#e63946' };
    return                               { fill: 'rgba(230,57,70,0.35)', stroke: '#e63946' };
  }
  if (split === 'train') return { fill: 'rgba(78,168,222,0.35)',  stroke: '#4ea8de' };
  if (split === 'val')   return { fill: 'rgba(244,162,97,0.40)', stroke: '#f4a261' };
  if (split === 'test')  return { fill: 'rgba(168,218,220,0.35)', stroke: '#a8dadc' };
  return                        { fill: 'rgba(180,180,180,0.3)', stroke: '#aaa' };
}

function cls2Class(pct) {
  if (pct > 20) return 'cls2-high';
  if (pct > 5)  return 'cls2-med';
  if (pct > 0)  return 'cls2-low';
  return '';
}

// Info panel
const panel = document.getElementById('info-panel');
function showInfo(props) {
  panel.style.display = 'block';
  document.getElementById('ip-title').textContent = 'Patch ' + props.patch_id;
  const splitCls = 'split-' + props.set;
  const c2cls = cls2Class(props.class_2_pct);
  document.getElementById('ip-body').innerHTML = [
    ['Split',      '<span class="' + splitCls + '">' + props.set + '</span>'],
    ['Dominant',   props.dominant_class === 0 ? 'background' : props.dominant_class === 1 ? 'formal urban' : '<span class="cls2-high">informal</span>'],
    ['Background', props.class_0_pct.toFixed(1) + '%'],
    ['Formal',     props.class_1_pct.toFixed(1) + '%'],
    ['Informal',   '<span class="' + c2cls + '">' + props.class_2_pct.toFixed(1) + '%</span>'],
    ['Pure tile',  props.is_pure ? 'yes' : 'no'],
  ].map(([k,v]) => '<div class="info-row"><span class="info-key">' + k + '</span><span class="info-val">' + v + '</span></div>').join('');
}

// Stats
let counts = { train:0, val:0, test:0, cls2:0 };

// GeoJSON layer
L.geoJSON(GRID, {
  style: function(feat) {
    const c = tileColor(feat.properties);
    return { fillColor: c.fill, color: c.stroke, weight: 1.2, fillOpacity: 1 };
  },
  onEachFeature: function(feat, layer) {
    const p = feat.properties;
    counts[p.set] = (counts[p.set] || 0) + 1;
    if (p.class_2_pct > 0) counts.cls2++;

    layer.on('click', function(e) {
      showInfo(p);
      L.DomEvent.stopPropagation(e);
    });

    layer.on('mouseover', function() {
      layer.setStyle({ weight: 2.5, fillOpacity: 1 });
      showInfo(p);
    });
    layer.on('mouseout', function() {
      layer.setStyle({ weight: 1.2 });
    });

    const c2str = p.class_2_pct > 0
      ? '<b style="color:#e63946">' + p.class_2_pct.toFixed(1) + '%</b>'
      : '0%';
    layer.bindTooltip(
      'Patch ' + p.patch_id + ' &nbsp;|&nbsp; ' + p.set +
      '<br>Formal: ' + p.class_1_pct.toFixed(0) + '% &nbsp; Informal: ' + c2str,
      { className: '', sticky: true }
    );
  }
}).addTo(map);

// Update stats in header
document.getElementById('s-train').textContent = counts.train;
document.getElementById('s-val').textContent   = counts.val;
document.getElementById('s-test').textContent  = counts.test;
document.getElementById('s-cls2').textContent  = counts.cls2;
document.getElementById('s-total').textContent = counts.train + counts.val + counts.test;

// Click anywhere on map to hide panel
map.on('click', function() { panel.style.display = 'none'; });
</script>
</body>
</html>
